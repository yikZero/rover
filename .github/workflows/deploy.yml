name: Build and Deploy

on:
  push:
    branches: [master]
  repository_dispatch:
    types: [rebuild]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Prepare deploy
        run: |
          mkdir deploy
          mv dist deploy/
          cp package.json bun.lock deploy/

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host rover
            HostName $SERVER_HOST
            User $SERVER_USER
            Port $SERVER_PORT
            IdentityFile ~/.ssh/deploy_key
          EOF

      - name: Deploy and restart
        run: |
          rsync -avz --delete --exclude node_modules --exclude .env \
            -e ssh deploy/ rover:/opt/rover/

          ssh rover 'cd /opt/rover && bun install --production --frozen-lockfile --ignore-scripts && (pm2 restart rover 2>/dev/null || pm2 start dist/server/entry.mjs --name rover --node-args="--env-file=/opt/rover/.env")'
